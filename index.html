<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADA Swift Console</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 40px 0;
      border-bottom: 1px solid #334155;
      margin-bottom: 30px;
    }
    header h1 {
      font-size: 2.5rem;
      color: #4ade80;
      margin-bottom: 10px;
    }
    header p {
      color: #94a3b8;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-card h3 {
      font-size: 2rem;
      color: #4ade80;
      margin-bottom: 5px;
    }
    .stat-card p {
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .section {
      background: #1e293b;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 25px;
    }
    .section h2 {
      color: #4ade80;
      margin-bottom: 20px;
      font-size: 1.3rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    .form-group label {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    .form-group input,
    .form-group select {
      padding: 12px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #4ade80;
    }
    .checkbox-group {
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }
    .checkbox-group input {
      width: 20px;
      height: 20px;
    }
    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #4ade80;
      color: #0f172a;
      font-weight: 600;
    }
    .btn-primary:hover {
      background: #22c55e;
    }
    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    .btn-secondary:hover {
      background: #475569;
    }
    .widget-list {
      display: grid;
      gap: 15px;
    }
    .widget-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 15px;
      align-items: center;
    }
    .widget-info h4 {
      color: #e2e8f0;
      margin-bottom: 5px;
    }
    .widget-info p {
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .widget-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-basic {
      background: #3b82f6;
      color: white;
    }
    .badge-pro {
      background: #8b5cf6;
      color: white;
    }
    .badge-enterprise {
      background: #f59e0b;
      color: white;
    }
    .badge-pending {
      background: #fbbf24;
      color: #0f172a;
    }
    .badge-delivered {
      background: #4ade80;
      color: #0f172a;
    }
    .badge-review {
      background: #f472b6;
      color: white;
    }
    .widget-actions {
      display: flex;
      gap: 10px;
    }
    .btn-small {
      padding: 8px 16px;
      font-size: 0.85rem;
    }
    .embed-code {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #4ade80;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .embed-code.visible {
      display: block;
    }
    .message {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .message.success {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid #4ade80;
      color: #4ade80;
      display: block;
    }
    .message.error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid #f87171;
      color: #f87171;
      display: block;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    .empty-state h3 {
      color: #94a3b8;
      margin-bottom: 10px;
    }
    @media (max-width: 768px) {
      .widget-card {
        grid-template-columns: 1fr;
      }
      .widget-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>♿ ADA Swift Console</h1>
      <p>Widget Management & Delivery System</p>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <h3 id="total-widgets">0</h3>
        <p>Total Widgets</p>
      </div>
      <div class="stat-card">
        <h3 id="pending-widgets">0</h3>
        <p>Pending</p>
      </div>
      <div class="stat-card">
        <h3 id="delivered-widgets">0</h3>
        <p>Delivered</p>
      </div>
      <div class="stat-card">
        <h3 id="auto-deliver-widgets">0</h3>
        <p>Auto-Delivery</p>
      </div>
    </div>

    <!-- Add Website Form -->
    <div class="section">
      <h2>➕ Add New Website</h2>
      <div id="form-message" class="message"></div>
      <form id="add-website-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Business Name *</label>
            <input type="text" name="business_name" required placeholder="Acme Corporation">
          </div>
          <div class="form-group">
            <label>Contact Name *</label>
            <input type="text" name="contact_name" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Contact Email *</label>
            <input type="email" name="contact_email" required placeholder="john@acme.com">
          </div>
          <div class="form-group">
            <label>Domain *</label>
            <input type="text" name="domain" required placeholder="acme.com">
          </div>
          <div class="form-group">
            <label>Plan Tier</label>
            <select name="plan_tier">
              <option value="basic">Basic</option>
              <option value="pro">Pro</option>
              <option value="enterprise">Enterprise</option>
            </select>
          </div>
          <div class="form-group checkbox-group">
            <input type="checkbox" name="auto_deliver" id="auto_deliver" checked>
            <label for="auto_deliver">Auto-deliver widget</label>
          </div>
        </div>
        <div style="margin-top: 20px;">
          <button type="submit" class="btn btn-primary">Add Website & Trigger Delivery</button>
        </div>
      </form>
    </div>

    <!-- Widget List -->
    <div class="section">
      <h2>📋 Widget Requests</h2>
      <div id="widget-list" class="widget-list">
        <div class="loading">Loading widgets...</div>
      </div>
    </div>
  </div>

  <script>
    // Configuration
    const NOCODEBACKEND_API_KEY = '3a8c4c52bfafbe26fe25ca473f8a25bbea6c66448a6dfef2bab6fe8a67ef';
    const NOCODEBACKEND_BASE = 'https://api.nocodebackend.com/api/v1';
    const TABLE = 'ada_widget_requests';
    const WEBHOOK_SERVER = 'http://localhost:3459';

    // State
    let widgets = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadWidgets();
      setupForm();
    });

    // Load widgets from NoCodeBackend
    async function loadWidgets() {
      try {
        const response = await fetch(`${NOCODEBACKEND_BASE}/${TABLE}?limit=1000&sort=created_at:desc`, {
          headers: {
            'Authorization': `Bearer ${NOCODEBACKEND_API_KEY}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) throw new Error('Failed to load widgets');

        const data = await response.json();
        widgets = data.data || [];
        
        updateStats();
        renderWidgets();
      } catch (error) {
        console.error('Load error:', error);
        document.getElementById('widget-list').innerHTML = `
          <div class="empty-state">
            <h3>⚠️ Error Loading Widgets</h3>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    // Update statistics
    function updateStats() {
      document.getElementById('total-widgets').textContent = widgets.length;
      document.getElementById('pending-widgets').textContent = 
        widgets.filter(w => w.status === 'pending' || w.status === 'pending_review').length;
      document.getElementById('delivered-widgets').textContent = 
        widgets.filter(w => w.status === 'delivered').length;
      document.getElementById('auto-deliver-widgets').textContent = 
        widgets.filter(w => w.auto_deliver).length;
    }

    // Render widget list
    function renderWidgets() {
      const container = document.getElementById('widget-list');
      
      if (widgets.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No widgets yet</h3>
            <p>Add your first website using the form above</p>
          </div>
        `;
        return;
      }

      container.innerHTML = widgets.map(widget => `
        <div class="widget-card" data-id="${widget.widget_id}">
          <div class="widget-info">
            <h4>${widget.business_name}</h4>
            <p>${widget.contact_name} • ${widget.contact_email} • ${widget.domain}</p>
            <div class="widget-meta">
              <span class="badge badge-${widget.plan_tier}">${widget.plan_tier}</span>
              <span class="badge badge-${widget.status === 'pending_review' ? 'review' : widget.status}">${widget.status}</span>
              ${widget.auto_deliver ? '<span class="badge" style="background:#334155">Auto</span>' : ''}
            </div>
            <div class="embed-code" id="embed-${widget.widget_id}">${escapeHtml(widget.embed_code || 'No embed code generated yet')}</div>
          </div>
          <div class="widget-actions">
            ${widget.status !== 'delivered' ? `
              <button class="btn btn-primary btn-small" onclick="deliverWidget('${widget.widget_id}')">
                Deliver Now
              </button>
            ` : ''}
            <button class="btn btn-secondary btn-small" onclick="toggleAutoDeliver('${widget.widget_id}', ${!widget.auto_deliver})">
              ${widget.auto_deliver ? 'Disable Auto' : 'Enable Auto'}
            </button>
            <button class="btn btn-secondary btn-small" onclick="toggleEmbed('${widget.widget_id}')">
              View Code
            </button>
          </div>
        </div>
      `).join('');
    }

    // Setup form submission
    function setupForm() {
      document.getElementById('add-website-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(e.target);
        const data = {
          business_name: formData.get('business_name'),
          contact_name: formData.get('contact_name'),
          contact_email: formData.get('contact_email'),
          domain: formData.get('domain'),
          plan_tier: formData.get('plan_tier'),
          auto_deliver: formData.has('auto_deliver')
        };

        showMessage('Adding website...', 'info');

        try {
          // Check for duplicates first
          const duplicate = widgets.find(w => 
            w.contact_email === data.contact_email || 
            w.domain === data.domain
          );

          if (duplicate) {
            showMessage('⚠️ A widget already exists for this email or domain', 'error');
            return;
          }

          // Add to NoCodeBackend via webhook server
          const response = await fetch(`${WEBHOOK_SERVER}/webhook/ada-widget-crm`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          const result = await response.json();

          if (result.success) {
            showMessage(`✅ Website added! Widget ID: ${result.widget_id}`, 'success');
            e.target.reset();
            loadWidgets(); // Refresh list
          } else {
            showMessage(`❌ ${result.message || result.error}`, 'error');
          }
        } catch (error) {
          console.error('Submit error:', error);
          showMessage(`❌ Error: ${error.message}`, 'error');
        }
      });
    }

    // Deliver widget manually
    async function deliverWidget(widgetId) {
      try {
        const response = await fetch(`${WEBHOOK_SERVER}/internal/process-delivery`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ widget_id: widgetId, auto_deliver: true })
        });

        const result = await response.json();

        if (result.success) {
          showMessage('✅ Widget delivered!', 'success');
          loadWidgets();
        } else {
          showMessage(`❌ ${result.error || 'Delivery failed'}`, 'error');
        }
      } catch (error) {
        showMessage(`❌ Error: ${error.message}`, 'error');
      }
    }

    // Toggle embed code visibility
    function toggleEmbed(widgetId) {
      const embedDiv = document.getElementById(`embed-${widgetId}`);
      embedDiv.classList.toggle('visible');
    }

    // Toggle auto-deliver for existing widget
    async function toggleAutoDeliver(widgetId, newValue) {
      try {
        // Find the widget record ID first
        const widget = widgets.find(w => w.widget_id === widgetId);
        if (!widget) {
          showMessage('❌ Widget not found', 'error');
          return;
        }

        // Update via NoCodeBackend API
        const response = await fetch(`${NOCODEBACKEND_BASE}/${TABLE}/${widget.id}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${NOCODEBACKEND_API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ auto_deliver: newValue })
        });

        if (response.ok) {
          showMessage(`✅ Auto-delivery ${newValue ? 'enabled' : 'disabled'} for ${widget.business_name}`, 'success');
          loadWidgets(); // Refresh to show updated state
        } else {
          showMessage('❌ Failed to update auto-delivery setting', 'error');
        }
      } catch (error) {
        console.error('Toggle error:', error);
        showMessage(`❌ Error: ${error.message}`, 'error');
      }
    }

    // Show message
    function showMessage(text, type) {
      const msgDiv = document.getElementById('form-message');
      msgDiv.textContent = text;
      msgDiv.className = `message ${type}`;
      
      if (type === 'success' || type === 'error') {
        setTimeout(() => {
          msgDiv.className = 'message';
        }, 5000);
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
